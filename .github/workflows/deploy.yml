name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── 1. Deploy landing page → buildmetrics.uk ─────────────────────────────
  deploy-landing:
    name: "Deploy: buildmetrics.uk (landing)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy landing via SFTP
        env:
          SFTP_SERVER:   ${{ secrets.FTP_SERVER }}
          SFTP_USER:     ${{ secrets.FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open sftp://$SFTP_USER:$SFTP_PASSWORD@$SFTP_SERVER:22;
            mirror --reverse --delete --verbose \
              --exclude '^\.git' \
              --exclude '\.DS_Store' \
              ./landing/ /public_html/
          "

  # ── 2. Deploy app → app.buildmetrics.uk ──────────────────────────────────
  deploy-app:
    name: "Deploy: app.buildmetrics.uk"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy app via SFTP
        env:
          SFTP_SERVER:   ${{ secrets.FTP_SERVER }}
          SFTP_USER:     ${{ secrets.FTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open sftp://$SFTP_USER:$SFTP_PASSWORD@$SFTP_SERVER:22;
            mirror --reverse --delete --verbose \
              --exclude '^\.git' \
              --exclude '\.DS_Store' \
              --exclude '^\.claude/' \
              --exclude '^\.github/' \
              --exclude '^landing/' \
              --exclude '^beamcalc-pro/' \
              --exclude '^node_modules/' \
              --exclude 'AUDIT_REPORT\.md' \
              --exclude 'markjcreative-landing\.html' \
              ./ /public_html/buildmetrics_app/
          "
