name: Deploy to Hostinger

# ─── Trigger ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Deploy landing page → buildmetrics.uk ─────────────────────────────
  deploy-landing:
    name: "Deploy: buildmetrics.uk (landing)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: FTP upload → public_html/ (attempt 1)
        id: ftp_landing_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          port:      21
          protocol:  ftps
          local-dir: ./landing/
          server-dir: /public_html/
          timeout:   60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      - name: FTP upload → public_html/ (retry with plain FTP)
        if: steps.ftp_landing_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          port:      21
          protocol:  ftp
          local-dir: ./landing/
          server-dir: /public_html/
          timeout:   60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

  # ── 2. Deploy app → app.buildmetrics.uk ──────────────────────────────────
  deploy-app:
    name: "Deploy: app.buildmetrics.uk"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: FTP upload → subdomain document root (attempt 1)
        id: ftp_app_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          port:      21
          protocol:  ftps
          local-dir: ./
          server-dir: /public_html/buildmetrics_app/
          timeout:   60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/.claude/**
            .github/**
            landing/**
            beamcalc-pro/**
            markjcreative-landing.html
            AUDIT_REPORT.md

      - name: FTP upload → subdomain document root (retry with plain FTP)
        if: steps.ftp_app_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          port:      21
          protocol:  ftp
          local-dir: ./
          server-dir: /public_html/buildmetrics_app/
          timeout:   60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/.claude/**
            .github/**
            landing/**
            beamcalc-pro/**
            markjcreative-landing.html
            AUDIT_REPORT.md
