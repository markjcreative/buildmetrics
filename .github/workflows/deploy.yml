name: Deploy to Hostinger

# ─── Trigger ──────────────────────────────────────────────────────────────────
# Deployment is handled by Hostinger's native Git auto-deploy (hPanel → Git).
# Hostinger pulls from GitHub automatically on each push — no FTP/SFTP needed.
#
# Setup instructions:
#   1. Hostinger hPanel → Websites → Manage → Git
#   2. Connect repo: https://github.com/markjcreative/buildmetrics.git
#   3. Branch: main
#   4. Deploy path: /public_html/buildmetrics_app/  (app)
#   5. Enable "Auto-deploy on push"
#   6. Repeat for landing: /public_html/
#
# This workflow file is kept for reference and manual fallback.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    name: "Deployment via Hostinger Git"
    runs-on: ubuntu-latest
    steps:
      - name: Deployment note
        run: |
          echo "✅ Push received on main."
          echo "Deployment is handled by Hostinger's native Git auto-deploy."
          echo "If auto-deploy is not configured, log into hPanel → Git to set it up."
          echo "Repo: https://github.com/markjcreative/buildmetrics.git"
