<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculation History — BuildMetrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="/js/auth/auth.js"></script>
  <script src="/js/projects/history.js"></script>
  <script src="/js/projects/projects.js"></script>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <style>
    /* ── Page body ── */
    .page-body {
      flex: 1;
      padding: 36px 40px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .breadcrumb a:hover { color: var(--accent); }

    .breadcrumb-sep { color: var(--border-strong); }

    /* ── Page header within body ── */
    .history-header {
      margin-bottom: 24px;
    }

    .history-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .history-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ── Filter chips ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      background: white;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .filter-chip:hover {
      border-color: var(--border-strong);
      color: var(--text-primary);
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── Calc list ── */
    .calc-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .calc-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      transition: all 0.18s;
      box-shadow: var(--shadow-sm);
    }

    .calc-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--accent-mid);
    }

    .calc-card[data-hidden="true"] {
      display: none;
    }

    .calc-info {
      flex: 1;
      min-width: 0;
    }

    .calc-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .type-badge.beam       { background: #DBEAFE; color: #1D4ED8; }
    .type-badge.column     { background: #FEF3C7; color: #B45309; }
    .type-badge.slab       { background: #DCFCE7; color: #15803D; }
    .type-badge.footing    { background: #EDE9FE; color: #6D28D9; }
    .type-badge.retaining_wall { background: #FEE2E2; color: #B91C1C; }
    .type-badge.connection { background: #CFFAFE; color: #0E7490; }
    .type-badge.default    { background: var(--bg-subtle); color: var(--text-secondary); }

    .calc-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .calc-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .calc-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .calc-stat {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .calc-stat.moment   { background: var(--accent-light); border-color: var(--accent-mid); color: var(--accent); }
    .calc-stat.shear    { background: var(--green-tint); border-color: #BBF7D0; color: var(--green); }
    .calc-stat.defl     { background: var(--purple-tint); border-color: #DDD6FE; color: var(--purple); }

    .calc-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      align-items: center;
    }

    .btn-load {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-load:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-csv {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-csv:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-tint);
    }

    .btn-del {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .btn-del:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-tint);
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div id="app-shell">

    <aside id="sidebar"></aside>

    <div id="page-content">

      <!-- ════ TOPBAR ═════════════════════════════════════════════════════ -->
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-breadcrumb">
            <a href="/projects.html">Projects</a>
            <span class="sep">›</span>
            <span id="topbar-project-name">History</span>
          </div>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary" id="btn-new-calc" style="font-size:0.82rem; padding: 7px 16px;">⚡ New Calculation</button>
        </div>
      </div>

      <!-- ════ PAGE BODY ═══════════════════════════════════════════════════ -->
      <div class="page-body">

        <div class="history-header">
          <div class="history-title" id="project-title">Calculation History</div>
          <div class="history-subtitle" id="project-desc"></div>
        </div>

        <!-- Filter chips -->
        <div class="filter-bar" id="filter-bar">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="beam" style="--fc:2563EB">Beam</button>
          <button class="filter-chip" data-filter="column" style="--fc:D97706">Column</button>
          <button class="filter-chip" data-filter="slab" style="--fc:16A34A">Slab</button>
          <button class="filter-chip" data-filter="footing" style="--fc:7C3AED">Footing</button>
          <button class="filter-chip" data-filter="retaining_wall" style="--fc:DC2626">Wall</button>
          <button class="filter-chip" data-filter="connection" style="--fc:0891B2">Conn.</button>
        </div>

        <div id="history-container"></div>
      </div>
    </div>
  </div>

  <script src="/js/ui/sidebar.js"></script>
  <script src="/js/ui/cmdPalette.js"></script>

  <script>
    Auth.guard();

    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    if (!projectId) { window.location.href = '/projects.html'; }

    const project = Projects.get(projectId);
    if (!project) { window.location.href = '/projects.html'; }

    // Set active
    Projects.setActive(projectId);

    // Header + topbar project name
    document.getElementById('topbar-project-name').textContent = project.name;
    document.getElementById('project-title').textContent = project.name;
    if (project.description) document.getElementById('project-desc').textContent = project.description;

    // New calculation — go to calculator with active project set
    document.getElementById('btn-new-calc').addEventListener('click', () => {
      window.location.href = '/index.html';
    });

    // ── Filter chip logic ──────────────────────────────────────────────
    let activeFilter = 'all';

    document.getElementById('filter-bar').addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      activeFilter = chip.dataset.filter;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c === chip));
      applyFilter();
    });

    function applyFilter() {
      document.querySelectorAll('.calc-card[data-calc-type]').forEach(card => {
        const type = card.dataset.calcType || 'beam';
        const hidden = activeFilter !== 'all' && type !== activeFilter;
        card.dataset.hidden = hidden ? 'true' : 'false';
      });
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function relativeTime(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(dateStr).toLocaleString('en-AU', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function typeBadgeClass(calcType) {
      const map = { beam: 'beam', column: 'column', slab: 'slab', footing: 'footing', retaining_wall: 'retaining_wall', connection: 'connection' };
      return map[calcType] || 'default';
    }

    function typeBadgeLabel(calcType) {
      const map = { beam: 'Beam', column: 'Column', slab: 'Slab', footing: 'Footing', retaining_wall: 'Wall', connection: 'Conn.' };
      return map[calcType] || (calcType || 'Beam');
    }

    // ── Render history ────────────────────────────────────────────────
    function renderHistory() {
      const calcs = History.list(projectId);
      const container = document.getElementById('history-container');

      if (calcs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🧮</div>
            <h3>No calculations yet</h3>
            <p>Start a new calculation and save it to this project to build your history.</p>
            <button class="btn btn-primary" onclick="document.getElementById('btn-new-calc').click()">⚡ New Calculation</button>
          </div>`;
        return;
      }

      const list = document.createElement('div');
      list.className = 'calc-list';

      calcs.forEach(calc => {
        const savedAt = relativeTime(calc.savedAt);
        const s = calc.summary || {};
        const moment = s.maxAbsMoment != null ? `${Number(s.maxAbsMoment).toFixed(2)} kNm` : '—';
        const shear  = s.maxAbsShear   != null ? `${Number(s.maxAbsShear).toFixed(2)} kN`   : '—';
        const defl   = s.maxDeflection != null ? `${(Number(s.maxDeflection) * 1000).toFixed(3)} mm` : '—';
        const span   = calc.config && calc.config.span != null ? `${calc.config.span} m` : null;
        const calcType = calc.calcType || 'beam';
        const badgeClass = typeBadgeClass(calcType);
        const badgeLabel = typeBadgeLabel(calcType);

        // Determine load URL for this calc type
        const calcPageMap = {
          beam: '/index.html',
          column: '/column.html',
          slab: '/slab.html',
          footing: '/footing.html',
          retaining_wall: '/wall.html',
          connection: '/connection.html',
        };
        const loadUrl = `${calcPageMap[calcType] || '/index.html'}?load=${calc.id}`;

        const card = document.createElement('div');
        card.className = 'calc-card';
        card.dataset.calcType = calcType;
        card.dataset.hidden = 'false';
        card.innerHTML = `
          <div class="calc-info">
            <div class="calc-top">
              <span class="type-badge ${badgeClass}">${badgeLabel}</span>
              <span class="calc-name">${escHtml(calc.name)}</span>
            </div>
            <div class="calc-meta">
              <span>📁 ${escHtml(project.name)}</span>
              <span>🕐 ${savedAt}</span>
              ${span ? `<span>↔ Span: ${span}</span>` : ''}
            </div>
            <div class="calc-stats">
              <span class="calc-stat moment">M = ${moment}</span>
              <span class="calc-stat shear">V = ${shear}</span>
              <span class="calc-stat defl">δ = ${defl}</span>
            </div>
          </div>
          <div class="calc-actions">
            <button class="btn-load" onclick="loadCalc('${escHtml(loadUrl)}')">Load →</button>
            <button class="btn-csv" onclick="event.stopPropagation(); exportCsv('${calc.id}')" title="Export CSV">CSV</button>
            <button class="btn-del" onclick="event.stopPropagation(); deleteCalc('${calc.id}')" title="Delete">🗑</button>
          </div>`;
        list.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(list);
      applyFilter();
    }

    function loadCalc(url) {
      window.location.href = url;
    }

    function exportCsv(id) {
      const calc = History.get ? History.get(id) : null;
      if (!calc) { showToast('Calculation not found.', 'error'); return; }
      const s = calc.summary || {};
      const rows = [
        ['Calculation Name', calc.name],
        ['Saved At', new Date(calc.savedAt).toLocaleString('en-AU')],
        ['Project', project.name],
        ['Span (m)', calc.config && calc.config.span != null ? calc.config.span : ''],
        ['Max Moment (kNm)', s.maxAbsMoment != null ? Number(s.maxAbsMoment).toFixed(4) : ''],
        ['Max Shear (kN)', s.maxAbsShear != null ? Number(s.maxAbsShear).toFixed(4) : ''],
        ['Max Deflection (mm)', s.maxDeflection != null ? (Number(s.maxDeflection) * 1000).toFixed(4) : ''],
      ];
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${calc.name.replace(/[^a-z0-9]/gi, '_')}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('CSV exported.');
    }

    function deleteCalc(id) {
      if (!confirm('Delete this calculation? This cannot be undone.')) return;
      History.remove(id);
      renderHistory();
      showToast('Calculation deleted.');
    }

    function showToast(msg, type = 'default') {
      const icons = { default: 'ℹ', success: '✓', error: '⚠' };
      const t = document.createElement('div');
      t.className = `bm-toast bm-toast--${type}`;
      t.innerHTML = `<span class="bm-toast-icon">${icons[type] || icons.default}</span>${escHtml(msg)}`;
      document.body.appendChild(t);
      requestAnimationFrame(() => { requestAnimationFrame(() => { t.classList.add('show'); }); });
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 3000);
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => {
      Sidebar.init();
      renderHistory();
    });
  </script>
</body>

</html>
