<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — BuildMetrics</title>
  <meta name="description"
    content="Sign in or create your BuildMetrics account to access professional structural analysis tools." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://beam-calculator-red.vercel.app/login.html" />
  <meta property="og:title" content="Sign In — BuildMetrics" />
  <meta property="og:description"
    content="Professional structural analysis tools for engineers. Sign in to access shear force, bending moment diagrams and PDF reports." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://beam-calculator-red.vercel.app/login.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="js/auth/auth.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --accent-light: #EFF6FF;
      --accent-mid: #BFDBFE;
      --border: #E4E4E7;
      --text-primary: #09090B;
      --text-secondary: #52525B;
      --text-muted: #A1A1AA;
      --red: #DC2626;
      --red-tint: #FEF2F2;
      --green: #16A34A;
      --green-tint: #F0FDF4;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 50%, #0F172A 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Card ── */
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 16px;
      border-top: 3px solid #2563EB;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      padding: 36px 40px 40px;
    }

    /* ── Brand header ── */
    .auth-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-align: center;
    }

    .auth-brand-logo {
      width: 52px;
      height: 52px;
      background: #2563EB;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .auth-brand-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .auth-brand-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Tabs ── */
    .auth-tabs {
      display: flex;
      background: #F4F4F5;
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .auth-tab.active {
      background: white;
      color: var(--text-primary);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.10);
    }

    /* ── Alert ── */
    .auth-alert {
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-weight: 500;
      display: none;
      margin-bottom: 16px;
    }

    .auth-alert.error {
      background: var(--red-tint);
      border: 1px solid #FECACA;
      color: var(--red);
      display: block;
    }

    .auth-alert.success {
      background: var(--green-tint);
      border: 1px solid #BBF7D0;
      color: var(--green);
      display: block;
    }

    /* ── Form ── */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.1px;
    }

    .form-group input {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 11px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-width: 0;
    }
    .form-row-2 > * { min-width: 0; }

    /* ── Submit ── */
    .btn-auth {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.1px;
      margin-top: 4px;
    }

    .btn-auth:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.30);
    }

    .btn-auth:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-auth:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Google button ── */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      margin-bottom: 4px;
    }
    .btn-google:hover {
      border-color: #CBD5E1;
      background: #F8FAFC;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-google svg { flex-shrink: 0; }

    /* ── OR divider ── */
    .auth-or {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
    }
    .auth-or::before,
    .auth-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ── Page footer ── */
    .page-footer {
      margin-top: 24px;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 28px 24px 32px;
      }

      .form-row-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="auth-card">

    <!-- Brand header -->
    <div class="auth-brand">
      <div class="auth-brand-logo">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="8" width="3" height="15" rx="1" fill="white"/>
          <rect x="21" y="8" width="3" height="15" rx="1" fill="white"/>
          <rect x="6" y="8" width="18" height="3" rx="1" fill="white"/>
          <rect x="12" y="15" width="6" height="2.5" rx="1" fill="rgba(255,255,255,0.55)"/>
        </svg>
      </div>
      <div>
        <div class="auth-brand-name">BuildMetrics</div>
        <div class="auth-brand-sub">Structural Analysis</div>
      </div>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <div class="auth-alert" id="auth-alert"></div>

    <!-- Google Sign-In -->
    <button class="btn-google" id="btn-google" onclick="doGoogleSignIn()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-or">or</div>

    <!-- Login Form -->
    <form class="auth-form" id="form-login" onsubmit="return false;">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required
          autocomplete="current-password" />
      </div>
      <button class="btn-auth" id="btn-login" onclick="doLogin()">Sign In →</button>
    </form>

    <!-- Register Form (hidden) -->
    <form class="auth-form" id="form-register" style="display:none;" onsubmit="return false;">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="e.g. James Smith" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Min. 6 characters" required />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Repeat password" required />
        </div>
      </div>
      <button class="btn-auth" id="btn-register" onclick="doRegister()">Create Account →</button>
    </form>

    <div class="auth-footer-link" id="auth-footer">
      New to BuildMetrics? <a href="#" onclick="switchTab('register'); return false;"
        style="color:var(--accent);font-weight:600;text-decoration:none;">Create a free account</a>
    </div>

  </div>

  <!-- Hidden GIS initialiser (One Tap disabled, we use button flow) -->
  <div id="g_id_onload"
       data-client_id="440038191618-he1pm3lglml6r6trivqce2q6u8sjbon8.apps.googleusercontent.com"
       data-callback="handleGoogleCredential"
       data-auto_prompt="false">
  </div>

  <div class="page-footer">© 2025 BuildMetrics</div>

  <script>
    // ── Google Client ID (replace with yours) ──────────────────
    const GOOGLE_CLIENT_ID = '440038191618-he1pm3lglml6r6trivqce2q6u8sjbon8.apps.googleusercontent.com';

    // ── Google callback — called by GIS with the credential JWT ─
    async function handleGoogleCredential(response) {
      const btn = document.getElementById('btn-google');
      btn.disabled = true;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" style="animation:spin 0.8s linear infinite" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="7" fill="none" stroke="#CBD5E1" stroke-width="2"/><path d="M9 2a7 7 0 0 1 7 7" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/></svg> Signing in…';

      try {
        const { user, isNew } = await Auth.loginWithGoogle(response.credential);
        window.location.href = '/dashboard.html';
      } catch (e) {
        showAlert(e.message || 'Google sign-in failed. Please try again.');
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Continue with Google`;
      }
    }

    // ── Trigger Google popup when button is clicked ────────────
    function doGoogleSignIn() {
      if (typeof google === 'undefined') {
        showAlert('Google Sign-In is loading — please try again in a moment.');
        return;
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
      });
      google.accounts.id.prompt(); // shows One Tap; falls back to popup
    }

    // Spin animation for loading state
    const spinStyle = document.createElement('style');
    spinStyle.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
    document.head.appendChild(spinStyle);

    // ── If already logged in, skip to dashboard ────────────────
    if (Auth.currentUser()) {
      window.location.href = '/dashboard.html';
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('form-login').style.display = isLogin ? 'flex' : 'none';
      document.getElementById('form-register').style.display = isLogin ? 'none' : 'flex';
      document.getElementById('auth-footer').innerHTML = isLogin
        ? 'New to BuildMetrics? <a href="#" onclick="switchTab(\'register\'); return false;" style="color:var(--accent);font-weight:600;text-decoration:none;">Create a free account</a>'
        : 'Already have an account? <a href="#" onclick="switchTab(\'login\'); return false;" style="color:var(--accent);font-weight:600;text-decoration:none;">Sign in</a>';
      clearAlert();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('auth-alert');
      el.textContent = msg;
      el.className = 'auth-alert ' + type;
    }

    function clearAlert() {
      document.getElementById('auth-alert').className = 'auth-alert';
    }

    async function doLogin() {
      clearAlert();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showAlert('Please fill in all fields.'); return; }

      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        await Auth.login(email, password);
        window.location.href = '/dashboard.html';
      } catch (e) {
        showAlert(e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    }

    async function doRegister() {
      clearAlert();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (!name || !email || !password || !confirm) { showAlert('Please fill in all fields.'); return; }
      if (password !== confirm) { showAlert('Passwords do not match.'); return; }

      const btn = document.getElementById('btn-register');
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        await Auth.register(email, password, name);
        window.location.href = '/dashboard.html';
      } catch (e) {
        showAlert(e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account →';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const isLogin = document.getElementById('form-login').style.display !== 'none';
        isLogin ? doLogin() : doRegister();
      }
    });
  </script>
</body>

</html>
