<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — BuildMetrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="/js/auth/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#2563EB;--accent-hover:#1D4ED8;--border:#E4E4E7;--text-primary:#09090B;--text-secondary:#52525B;--text-muted:#A1A1AA;--red:#DC2626;--red-tint:#FEF2F2;--radius:10px}
    body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#0F172A 0%,#1E3A8A 50%,#0F172A 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;-webkit-font-smoothing:antialiased}

    .auth-card{width:100%;max-width:420px;background:#fff;border-radius:16px;border-top:3px solid #2563EB;box-shadow:0 24px 80px rgba(0,0,0,0.4);padding:36px 40px 40px}

    .auth-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;text-align:center}
    .auth-brand-logo{width:52px;height:52px;background:#2563EB;border-radius:14px;display:flex;align-items:center;justify-content:center}
    .auth-brand-name{font-size:1.3rem;font-weight:800;color:var(--text-primary);letter-spacing:-0.5px}
    .auth-brand-sub{font-size:0.75rem;color:var(--text-muted);letter-spacing:0.4px;text-transform:uppercase;margin-top:2px}

    .auth-heading{font-size:1.05rem;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:20px}

    .auth-alert{padding:11px 14px;border-radius:var(--radius);font-size:0.82rem;font-weight:500;display:none;margin-bottom:16px}
    .auth-alert.error{background:#FEF2F2;border:1px solid #FECACA;color:var(--red);display:block}

    .auth-form{display:flex;flex-direction:column;gap:16px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group label{font-size:0.78rem;font-weight:600;color:var(--text-secondary)}
    .form-group input{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:0.9rem;padding:11px 14px;transition:border-color .15s,box-shadow .15s;outline:none}
    .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .form-group input::placeholder{color:var(--text-muted)}

    .forgot-link{text-align:right;margin-top:-8px}
    .forgot-link a{font-size:0.75rem;color:var(--accent);text-decoration:none;font-weight:500}
    .forgot-link a:hover{text-decoration:underline}

    .btn-auth{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
    .btn-auth:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.30)}
    .btn-auth:disabled{opacity:.65;cursor:not-allowed;transform:none}

    .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text-primary);cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s}
    .btn-google:hover{border-color:#CBD5E1;background:#F8FAFC;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .btn-google:disabled{opacity:.6;cursor:not-allowed}

    .auth-or{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text-muted);font-size:0.75rem;font-weight:500}
    .auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--border)}

    .auth-footer-link{text-align:center;margin-top:20px;font-size:0.82rem;color:var(--text-muted)}
    .auth-footer-link a{color:var(--accent);font-weight:600;text-decoration:none}
    .auth-footer-link a:hover{text-decoration:underline}

    .page-footer{margin-top:24px;font-size:0.72rem;color:rgba(255,255,255,.35);text-align:center}
    @media(max-width:480px){.auth-card{padding:28px 24px 32px}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-brand-logo">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none"><rect x="6" y="8" width="3" height="15" rx="1" fill="white"/><rect x="21" y="8" width="3" height="15" rx="1" fill="white"/><rect x="6" y="8" width="18" height="3" rx="1" fill="white"/><rect x="12" y="15" width="6" height="2.5" rx="1" fill="rgba(255,255,255,0.55)"/></svg>
      </div>
      <div>
        <div class="auth-brand-name">BuildMetrics</div>
        <div class="auth-brand-sub">Structural Analysis</div>
      </div>
    </div>

    <p class="auth-heading">Welcome back</p>
    <div class="auth-alert" id="auth-alert"></div>

    <!-- Google — official GSI button (reliable; renders here once the library loads) -->
    <div id="g-btn" style="display:flex;justify-content:center;min-height:44px"></div>
    <div id="g-btn-fallback" style="display:none;font-size:0.8rem;color:rgba(255,255,255,.5);text-align:center;margin-top:2px">
      Google Sign-In couldn't load — please use email &amp; password below.
    </div>

    <div class="auth-or">or</div>

    <form class="auth-form" onsubmit="return false;">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <div class="forgot-link"><a href="/reset-password.html">Forgot password?</a></div>
      <button class="btn-auth" id="btn-login" onclick="doLogin()">Sign In →</button>
    </form>

    <div class="auth-footer-link" style="margin-top:16px">
      Don't have an account? <a href="/signup">Create one free</a>
    </div>
  </div>

  <div class="page-footer">© 2025 BuildMetrics · <a href="https://buildmetrics.uk" style="color:rgba(255,255,255,.45);text-decoration:none;">buildmetrics.uk</a></div>

  <script>
    if (Auth.currentUser()) window.location.href = '/dashboard.html';

    const GOOGLE_CLIENT_ID = '440038191618-he1pm3lglml6r6trivqce2q6u8sjbon8.apps.googleusercontent.com';

    function showAlert(msg) {
      const el = document.getElementById('auth-alert');
      el.textContent = msg; el.className = 'auth-alert error';
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) { showAlert('Please fill in all fields.'); return; }
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        await Auth.login(email, password);
        window.location.href = '/dashboard';
      } catch (e) {
        if (e.message && e.message.toLowerCase().includes('no account found')) {
          window.location.href = '/signup?email=' + encodeURIComponent(email);
          return;
        }
        showAlert(e.message);
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    }

    async function handleGoogleCredential(response) {
      const status = document.getElementById('auth-alert');
      status.textContent = 'Signing in…'; status.className = 'auth-alert';
      try {
        await Auth.loginWithGoogle(response.credential);
        window.location.href = '/dashboard';
      } catch (e) {
        showAlert(e.message || 'Google sign-in failed. Please try again.');
      }
    }

    // Render Google's official button (reliable) once the GSI library has loaded.
    let _gsiTries = 0;
    function initGsi() {
      if (!window.google || !google.accounts || !google.accounts.id) {
        if (++_gsiTries > 50) { document.getElementById('g-btn-fallback').style.display = 'block'; return; }
        return setTimeout(initGsi, 100);
      }
      google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential });
      const el = document.getElementById('g-btn');
      const w = Math.min(400, Math.max(200, el.clientWidth || el.parentElement.clientWidth || 320));
      google.accounts.id.renderButton(el, {
        theme: 'filled_blue', size: 'large', type: 'standard',
        text: 'continue_with', shape: 'rectangular', logo_alignment: 'left', width: w
      });
    }
    initGsi();

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
