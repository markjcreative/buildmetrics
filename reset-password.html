<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password — BuildMetrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg,#0F172A 0%,#1E3A8A 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; color: #1F2937; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); width: 100%; max-width: 400px; padding: 36px 32px; }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .brand .logo { width: 36px; height: 36px; background: #2563EB; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .brand .name { font-size: 18px; font-weight: 800; color: #0F172A; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #0F172A; }
    p.sub { font-size: 13px; color: #6B7280; margin-bottom: 22px; line-height: 1.5; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 13px; border: 1.5px solid #E5E7EB; border-radius: 9px; font-size: 14px; font-family: inherit; margin-bottom: 16px; transition: border-color .14s; }
    input:focus { outline: none; border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    /* Password show/hide toggle. The wrap takes the input's bottom margin so it
       tightly contains the input, and .pw-toggle (class) overrides the generic
       button rule below (class beats type on specificity). */
    .pw-wrap { position: relative; display: block; margin-bottom: 16px; }
    .pw-wrap > input { width: 100%; padding-right: 44px; margin-bottom: 0; }
    .pw-toggle { position: absolute; top: 0; height: 100%; right: 4px; width: 36px; display: flex; align-items: center; justify-content: center; padding: 0; background: none; border: none; border-radius: 6px; color: #9CA3AF; cursor: pointer; transition: color .15s; }
    .pw-toggle:hover { color: #4B5563; }
    .pw-toggle:focus-visible { outline: 2px solid #2563EB; outline-offset: 2px; }
    .pw-toggle svg { width: 18px; height: 18px; display: block; }
    button { width: 100%; padding: 12px; border: none; border-radius: 9px; background: #2563EB; color: #fff; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: filter .14s; }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg { font-size: 13px; padding: 11px 13px; border-radius: 9px; margin-bottom: 16px; line-height: 1.5; display: none; }
    .msg.error { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .msg.ok { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .foot { margin-top: 18px; text-align: center; font-size: 13px; }
    .foot a { color: #2563EB; text-decoration: none; font-weight: 600; }
    .hint { font-size: 11.5px; color: #9CA3AF; margin: -8px 0 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="logo">⬛</div><div class="name">BuildMetrics</div></div>

    <div id="msg" class="msg"></div>

    <!-- REQUEST MODE (no token) -->
    <div id="request-mode" style="display:none;">
      <h1>Reset your password</h1>
      <p class="sub">Enter your account email and we'll send you a link to set a new password.</p>
      <form id="request-form">
        <label for="email">Email address</label>
        <input type="email" id="email" autocomplete="email" required placeholder="you@company.com" />
        <button type="submit" id="request-btn">Send reset link</button>
      </form>
    </div>

    <!-- CONFIRM MODE (token present) -->
    <div id="confirm-mode" style="display:none;">
      <h1>Set a new password</h1>
      <p class="sub">Choose a strong password for your account.</p>
      <form id="confirm-form">
        <label for="password">New password</label>
        <div class="pw-wrap">
          <input type="password" id="password" autocomplete="new-password" required placeholder="At least 8 characters" />
          <button type="button" class="pw-toggle" aria-label="Show password" aria-pressed="false" onclick="togglePw(this)">
            <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <label for="password2">Confirm password</label>
        <div class="pw-wrap">
          <input type="password" id="password2" autocomplete="new-password" required placeholder="Re-enter password" />
          <button type="button" class="pw-toggle" aria-label="Show password" aria-pressed="false" onclick="togglePw(this)">
            <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="hint">Minimum 8 characters.</div>
        <button type="submit" id="confirm-btn">Update password</button>
      </form>
    </div>

    <div class="foot"><a href="/login">← Back to sign in</a></div>
  </div>

  <script src="/js/auth/auth.js"></script>
  <script>
    // Global (called from inline onclick). Reveals/hides the input beside it.
    function togglePw(btn) {
      var input = btn.parentNode.querySelector('input');
      var reveal = input.type === 'password';
      input.type = reveal ? 'text' : 'password';
      btn.setAttribute('aria-pressed', String(reveal));
      btn.setAttribute('aria-label', reveal ? 'Hide password' : 'Show password');
      btn.querySelector('.eye-on').style.display  = reveal ? 'none' : '';
      btn.querySelector('.eye-off').style.display = reveal ? '' : 'none';
    }

    (function () {
      var token = new URLSearchParams(location.search).get('token');
      var msg = document.getElementById('msg');
      function show(type, text) { msg.className = 'msg ' + type; msg.textContent = text; msg.style.display = 'block'; }

      if (token) {
        document.getElementById('confirm-mode').style.display = 'block';
        document.getElementById('confirm-form').addEventListener('submit', async function (e) {
          e.preventDefault();
          var p1 = document.getElementById('password').value;
          var p2 = document.getElementById('password2').value;
          var btn = document.getElementById('confirm-btn');
          if (p1.length < 8) { show('error', 'Password must be at least 8 characters.'); return; }
          if (p1 !== p2) { show('error', 'Passwords do not match.'); return; }
          btn.disabled = true; btn.textContent = 'Updating…';
          try {
            await Auth.confirmPasswordReset(token, p1);
            show('ok', 'Password updated. Redirecting to sign in…');
            setTimeout(function () { location.href = '/login'; }, 1800);
          } catch (err) {
            show('error', err.message || 'Could not reset password.');
            btn.disabled = false; btn.textContent = 'Update password';
          }
        });
      } else {
        document.getElementById('request-mode').style.display = 'block';
        document.getElementById('request-form').addEventListener('submit', async function (e) {
          e.preventDefault();
          var email = document.getElementById('email').value.trim();
          var btn = document.getElementById('request-btn');
          btn.disabled = true; btn.textContent = 'Sending…';
          try {
            await Auth.requestPasswordReset(email);
            show('ok', 'If that email is registered, a reset link is on its way. Check your inbox.');
          } catch (err) {
            // Still show generic success to avoid revealing account existence
            show('ok', 'If that email is registered, a reset link is on its way. Check your inbox.');
          }
          btn.textContent = 'Send reset link';
        });
      }
    })();
  </script>
</body>
</html>
