<!-- BuildMetrics base email wrapper — replace {{CONTENT}} with each template body -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{{SUBJECT}}</title>
<style>
  body{margin:0;padding:0;background:#0F172A;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:#fff}
  .wrapper{max-width:560px;margin:0 auto;padding:32px 16px}
  .card{background:#1E293B;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.08)}
  .header{background:#0F172A;padding:24px 32px;border-bottom:1px solid rgba(255,255,255,0.07)}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-icon{width:36px;height:36px;background:#2563EB;border-radius:9px;display:flex;align-items:center;justify-content:center}
  .logo-name{font-size:1rem;font-weight:700;color:#fff}
  .body{padding:32px}
  .footer{padding:20px 32px;border-top:1px solid rgba(255,255,255,0.07);text-align:center}
  .footer p{font-size:0.75rem;color:rgba(255,255,255,0.3);margin:4px 0;line-height:1.6}
  .footer a{color:rgba(255,255,255,0.4);text-decoration:none}
  h1{font-size:1.4rem;font-weight:800;color:#fff;margin:0 0 8px;letter-spacing:-0.02em}
  p{font-size:0.9rem;color:rgba(255,255,255,0.65);line-height:1.7;margin:0 0 16px}
  .btn{display:inline-block;background:#2563EB;color:#fff;text-decoration:none;padding:12px 28px;border-radius:10px;font-weight:700;font-size:0.9rem;margin:8px 0}
  .btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8)}
  .divider{height:1px;background:rgba(255,255,255,0.07);margin:20px 0}
  .badge{display:inline-block;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:100px;padding:3px 12px;font-size:0.72rem;font-weight:600;color:#60A5FA;margin-bottom:16px}
  .highlight-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px 20px;margin:16px 0}
  .success-icon{width:56px;height:56px;background:rgba(16,185,129,0.15);border:2px solid rgba(16,185,129,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.6rem;text-align:center;line-height:56px}
  .warn-icon{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3)}
  table.data{width:100%;border-collapse:collapse}
  table.data td{padding:8px 0;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.05)}
  table.data td:first-child{color:rgba(255,255,255,0.4);width:40%}
  table.data td:last-child{color:#fff;font-weight:600}
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 30 30" fill="none"><rect x="6" y="8" width="3" height="15" rx="1" fill="white"/><rect x="21" y="8" width="3" height="15" rx="1" fill="white"/><rect x="6" y="8" width="18" height="3" rx="1" fill="white"/><rect x="12" y="15" width="6" height="2.5" rx="1" fill="rgba(255,255,255,0.55)"/></svg>
        </div>
        <span class="logo-name">BuildMetrics</span>
      </div>
    </div>
    <div class="body">
      {{CONTENT}}
    </div>
    <div class="footer">
      <p>BuildMetrics · <a href="https://buildmetrics.uk">buildmetrics.uk</a></p>
      <p><a href="https://buildmetrics.uk/privacy">Privacy Policy</a> &nbsp;·&nbsp; <a href="https://buildmetrics.uk/terms">Terms of Service</a> &nbsp;·&nbsp; <a href="{{UNSUBSCRIBE_URL}}">Unsubscribe</a></p>
      <p>© 2026 BuildMetrics. All rights reserved.</p>
    </div>
  </div>
</div>
</body>
</html>
