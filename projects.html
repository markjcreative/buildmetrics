<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects — BeamCalc Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="js/auth/auth.js"></script>
    <script src="js/projects/history.js"></script>
    <script src="js/projects/projects.js"></script>
    <link rel="stylesheet" href="css/main.css" />
    <style>
        /* ── Tokens matching main.css ── */
        :root {
            --mirage: #171A21;
            --cobalt: #294487;
            --cobalt-l: #3655A8;
            --cobalt-xl: rgba(41, 68, 135, 0.09);
            --orange: #FF681F;
            --border: rgba(41, 68, 135, 0.15);
            --border-s: rgba(41, 68, 135, 0.28);
            --glass: rgba(255, 255, 255, 0.72);
            --gborder: rgba(255, 255, 255, 0.55);
        }

        body,
        .page-wrap {
            background: transparent;
        }

        .page-wrap {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .page-content {
            flex: 1;
            padding: 44px 52px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Page header */
        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--mirage);
            letter-spacing: -0.6px;
        }

        .page-subtitle {
            font-size: 0.85rem;
            color: #6B7280;
            margin-top: 4px;
        }

        /* Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* New project card */
        .project-card-new {
            border: 2px dashed var(--border-s);
            border-radius: 18px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all .2s;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(12px);
            color: #6B7280;
            min-height: 190px;
        }

        .project-card-new:hover {
            border-color: var(--orange);
            color: var(--orange);
            background: rgba(255, 104, 31, 0.06);
        }

        .project-card-new .plus {
            font-size: 2.4rem;
            line-height: 1;
        }

        .project-card-new .new-label {
            font-size: .86rem;
            font-weight: 700;
        }

        /* Project card — glass with cobalt top strip */
        .project-card {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(18px) saturate(160%);
            border: 1px solid var(--gborder);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            gap: 0;
            transition: all .2s;
            box-shadow: 0 4px 24px rgba(23, 26, 33, 0.09), 0 1px 0 rgba(255, 255, 255, 0.90) inset;
            cursor: pointer;
            min-height: 190px;
            overflow: hidden;
            position: relative;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cobalt), var(--cobalt-l));
        }

        .project-card:hover {
            box-shadow: 0 12px 36px rgba(23, 26, 33, 0.14);
            transform: translateY(-4px);
        }

        .project-card-inner {
            padding: 24px 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .project-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .project-name {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--mirage);
            line-height: 1.3;
        }

        .project-desc {
            font-size: .82rem;
            color: #6B7280;
            line-height: 1.6;
            flex: 1;
        }

        .project-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: auto;
        }

        .project-meta-item {
            font-size: .74rem;
            color: #6B7280;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .project-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 30px;
            height: 30px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.80);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all .15s;
            color: #6B7280;
        }

        .btn-icon:hover {
            border-color: var(--cobalt);
            color: var(--cobalt);
            background: var(--cobalt-xl);
        }

        .btn-icon.danger:hover {
            border-color: #B91C1C;
            color: #B91C1C;
            background: #FEE2E2;
        }

        .calc-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--cobalt-xl);
            color: var(--cobalt);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 3px 11px;
            font-size: .72rem;
            font-weight: 700;
        }

        .project-footer {
            background: rgba(41, 68, 135, 0.04);
            border-top: 1px solid var(--border);
            padding: 11px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 100px 40px;
            color: #6B7280;
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.15rem;
            color: var(--mirage);
            margin-bottom: 8px;
            font-weight: 800;
        }

        .empty-state p {
            font-size: .86rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(23, 26, 33, 0.50);
            backdrop-filter: blur(8px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(28px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 22px;
            padding: 40px;
            width: min(500px, 100%);
            box-shadow: 0 24px 64px rgba(23, 26, 33, 0.28);
            animation: popIn .22s ease;
            position: relative;
            overflow: hidden;
        }

        .modal-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--cobalt), var(--orange));
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.94) translateY(10px)
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--mirage);
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .modal-sub {
            font-size: .83rem;
            color: #6B7280;
            margin-bottom: 22px;
        }

        .modal-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px;
        }

        .modal-field label {
            font-size: .72rem;
            font-weight: 700;
            color: var(--cobalt);
            letter-spacing: .4px;
            text-transform: uppercase;
        }

        .modal-field input,
        .modal-field textarea {
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--mirage);
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: .92rem;
            outline: none;
            transition: all .15s;
            resize: none;
        }

        .modal-field input:focus,
        .modal-field textarea:focus {
            border-color: var(--cobalt);
            box-shadow: 0 0 0 3px rgba(41, 68, 135, 0.14);
        }

        .modal-field input::placeholder,
        .modal-field textarea::placeholder {
            color: #B0B7C4;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 22px;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--mirage);
            color: #fff;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: .84rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(23, 26, 33, 0.30);
            border-left: 4px solid var(--orange);
            opacity: 0;
            transform: translateY(10px);
            transition: all .25s;
            pointer-events: none;
            z-index: 9999;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Buttons reuse */
        .btn {
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: .84rem;
            font-weight: 700;
            padding: 11px 22px;
            cursor: pointer;
            transition: all .18s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange), #FF8C42);
            color: #fff;
            box-shadow: 0 4px 16px rgba(255, 104, 31, 0.38);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255, 104, 31, 0.48);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.80);
            border: 1.5px solid var(--border-s);
            color: var(--mirage);
        }

        .btn-secondary:hover {
            background: var(--cobalt-xl);
            border-color: var(--cobalt);
            color: var(--cobalt);
        }

        @media(max-width:640px) {
            .page-content {
                padding: 20px 16px;
            }

            .page-title {
                font-size: 1.4rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrap">

        <!-- Navbar -->
        <nav id="navbar" role="navigation">
            <a href="/projects.html" class="nav-brand">
                <div class="nav-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L5 9h4v5H7l5 8 5-8h-2V9h4L12 2z" />
                    </svg>
                </div>
                <div>
                    <div class="nav-title">BeamCalc Pro</div>
                    <div class="nav-subtitle">Structural Analysis</div>
                </div>
            </a>
            <div class="nav-spacer"></div>
            <div class="nav-actions">
                <a href="/profile.html" class="btn-nav" style="text-decoration:none;">👤 Profile</a>
                <button class="btn-nav" onclick="Auth.logout()">⏏ Sign Out</button>
            </div>
        </nav>

        <div class="page-content">
            <div class="page-header">
                <div>
                    <div class="page-title" id="greeting">My Projects</div>
                    <div class="page-subtitle">Select a project to start or continue your calculations.</div>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">＋ New Project</button>
            </div>

            <div id="projects-container">
                <!-- Rendered by JS -->
            </div>
        </div>
    </div>

    <!-- New/Edit Project Modal -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal-box">
            <div class="modal-title" id="modal-heading-text">New Project</div>
            <div class="modal-sub">Give your project a name to organise your calculations.</div>
            <div class="modal-field">
                <label for="proj-name">Project Name *</label>
                <input type="text" id="proj-name" placeholder="e.g. Office Building — Level 3 Beams" maxlength="80" />
            </div>
            <div class="modal-field">
                <label for="proj-desc">Description (optional)</label>
                <textarea id="proj-desc" rows="2"
                    placeholder="e.g. Secondary beam grid at Level 3, grid B-D"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm-btn" onclick="confirmProject()">Create Project
                    →</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        Auth.guard();

        const user = Auth.currentUser();
        if (user) document.getElementById('greeting').textContent = `${user.name ? user.name + "'s " : ''}Projects`;

        let editingId = null;

        function renderProjects() {
            const projects = Projects.list();
            const container = document.getElementById('projects-container');

            if (projects.length === 0) {
                container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📁</div>
          <h3>No projects yet</h3>
          <p>Create your first project to start organising your beam calculations.</p>
        </div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'projects-grid';

            // New project card first
            const newCard = document.createElement('div');
            newCard.className = 'project-card-new';
            newCard.onclick = openCreateModal;
            newCard.innerHTML = `<div class="plus">＋</div><div class="new-label">New Project</div>`;
            grid.appendChild(newCard);

            projects.forEach(proj => {
                const calcCount = History.count(proj.id);
                const updated = new Date(proj.updatedAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });

                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
        <div class="project-card-inner">
          <div class="project-card-top">
            <div class="project-name">${escHtml(proj.name)}</div>
            <div class="project-actions">
              <button class="btn-icon" title="Edit" onclick="event.stopPropagation(); editProject('${proj.id}')">✏️</button>
              <button class="btn-icon danger" title="Delete" onclick="event.stopPropagation(); deleteProject('${proj.id}', '${escHtml(proj.name)}')">🗑</button>
            </div>
          </div>
          ${proj.description ? `<div class="project-desc">${escHtml(proj.description)}</div>` : ''}
          <div class="project-meta" style="margin-top:auto;">
            <span class="calc-count-badge">📊 ${calcCount} calc${calcCount !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div class="project-footer">
          <span class="project-meta-item">🕐 ${updated}</span>
        </div>`;

                card.onclick = () => openProject(proj.id);
                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        function openProject(id) {
            Projects.setActive(id);
            window.location.href = `/history.html?project=${id}`;
        }

        function openCreateModal() {
            editingId = null;
            document.getElementById('proj-name').value = '';
            document.getElementById('proj-desc').value = '';
            document.getElementById('modal-heading-text').textContent = 'New Project';
            document.getElementById('modal-confirm-btn').textContent = 'Create Project →';
            document.getElementById('create-modal').classList.add('open');
            setTimeout(() => document.getElementById('proj-name').focus(), 100);
        }

        function editProject(id) {
            const proj = Projects.get(id);
            if (!proj) return;
            editingId = id;
            document.getElementById('proj-name').value = proj.name;
            document.getElementById('proj-desc').value = proj.description || '';
            document.getElementById('modal-heading-text').textContent = 'Edit Project';
            document.getElementById('modal-confirm-btn').textContent = 'Save Changes →';
            document.getElementById('create-modal').classList.add('open');
            setTimeout(() => document.getElementById('proj-name').focus(), 100);
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.remove('open');
            editingId = null;
        }

        function confirmProject() {
            const name = document.getElementById('proj-name').value.trim();
            const desc = document.getElementById('proj-desc').value.trim();
            if (!name) { document.getElementById('proj-name').focus(); return; }
            try {
                if (editingId) {
                    Projects.update(editingId, { name, description: desc });
                    showToast('Project updated.');
                } else {
                    Projects.create(name, desc);
                    showToast('Project created!');
                }
                closeCreateModal();
                renderProjects();
            } catch (e) { alert(e.message); }
        }

        function deleteProject(id, name) {
            if (!confirm(`Delete project "${name}" and all its calculations?\n\nThis cannot be undone.`)) return;
            Projects.remove(id);
            renderProjects();
            showToast('Project deleted.');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Keyboard: Enter in modal
        document.getElementById('proj-name').addEventListener('keydown', e => { if (e.key === 'Enter') confirmProject(); });

        // Close modal on overlay click
        document.getElementById('create-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCreateModal(); });

        renderProjects();
    </script>
</body>

</html>
